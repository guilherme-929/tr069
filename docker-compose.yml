services:
  postgres:
    image: postgres:16-alpine
    container_name: tr069-postgres
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_USER: acs
      POSTGRES_PASSWORD: acs_secret
      POSTGRES_DB: tr069_acs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acs -d tr069_acs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tr069-network

  redis:
    image: redis:7-alpine
    container_name: tr069-redis
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tr069-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tr069-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://acs:acs_secret@postgres:5432/tr069_acs?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
      - "7547:7547"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - tr069-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tr069-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tr069-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: tr069-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - tr069-network

networks:
  tr069-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
